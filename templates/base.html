<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Campus</title>

    <!-- 🔥 Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- 🔥 Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>

        /* 🔥 GLOBAL */
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1c1c2b);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            color: white;
        }

        html {
            scroll-behavior: smooth;
        }

        /* 🔥 OPTIONAL IMAGE OVERLAY */
        body::before {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            background: url('/static/images/campus.jpg') no-repeat center center/cover;
            opacity: 0.08;
            z-index: -1;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 🔥 NAVBAR */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 30px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(12px);
            flex-wrap: wrap;
        }

        nav a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
            font-size: 15px;
            position: relative;
        }

        nav a:hover {
            color: #00c6ff;
        }

        nav a::after {
            content: '';
            position: absolute;
            width: 0%;
            height: 2px;
            background: #00c6ff;
            left: 0;
            bottom: -5px;
            transition: 0.3s;
        }

        nav a:hover::after {
            width: 100%;
        }

        /* 🔥 CONTAINER */
        .container {
            padding: 30px;
            max-width: 1200px;
            margin: auto;
        }

        /* 🔥 CARD */
        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.3s;
            font-size: 15px;
        }

        .card:hover {
            transform: translateY(-6px) scale(1.02);
        }

        /* 🔥 BUTTON */
        button {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
            padding: 10px 18px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            margin-top: 5px;
        }

        button:hover {
            transform: scale(1.05);
        }

        /* 🔥 INPUT */
        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
        }

        select option {
            background: #203a43;
        }

        /* 🔥 STATUS */
        .status {
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 13px;
            font-weight: 600;
        }

        .pending { background: orange; }
        .progress { background: #00bfff; }
        .resolved { background: #00c853; }
        .forwarded { background: #9b59b6; }

        /* 🔥 ANIMATION */
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 🔥 MOBILE RESPONSIVE */
        @media(max-width: 768px) {
            nav {
                flex-direction: column;
                align-items: flex-start;
            }

            nav div:last-child {
                margin-top: 10px;
            }

            .container {
                padding: 20px;
            }

            .card {
                font-size: 14px;
            }

            button {
                width: 100%;
            }
        }

    </style>
</head>

<body>

    <!-- 🔥 NAVBAR -->
    <nav>
        <div>
            <i class="fa-solid fa-building"></i> Smart Campus
        </div>

        <div>
            <a href="/">Home</a>
            <a href="/dashboard">Dashboard</a>
            <a href="/complaint">New Complaint</a>
            <a href="/track">Track</a>

            {% if session.get('role') == 'incharge' %}
                <a href="/incharge">Incharge</a>
            {% endif %}

            {% if session.get('role') == 'admin' %}
                <a href="/admin">Admin</a>
            {% endif %}

            {% if session.get('user') %}
                <a href="/logout">Logout</a>
            {% else %}
                <a href="/login">Login</a>
            {% endif %}
        </div>
    </nav>

    <!-- 🔥 CONTENT -->
    <div class="container">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
