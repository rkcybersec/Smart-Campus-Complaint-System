<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Campus</title>

    <!-- 🔥 Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- 🔥 Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>

        /* 🔥 GLOBAL STYLE */
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            font-size: 20px;  /* 🔥 FIXED FONT SIZE */
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1c1c2b);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            color: white;
            position: relative;
        }

        html {
            scroll-behavior: smooth;
        }

        /* 🔥 CAMPUS IMAGE OVERLAY */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('/static/images/campus.jpg') no-repeat center center/cover;
            opacity: 0.12;
            z-index: -1;
        }

        /* 🔥 BACKGROUND ANIMATION */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 🔥 NAVBAR */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 40px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        nav a {
            color: white;
            margin-left: 25px;
            text-decoration: none;
            font-weight: 500;
            position: relative;
            font-size: 18px;
        }

        nav a:hover {
            color: #00c6ff;
        }

        /* 🔥 NAVBAR UNDERLINE */
        nav a::after {
            content: '';
            position: absolute;
            width: 0%;
            height: 2px;
            background: #00c6ff;
            left: 0;
            bottom: -5px;
            transition: 0.3s;
        }

        nav a:hover::after {
            width: 100%;
        }

        /* 🔥 CONTAINER */
        .container {
            padding: 40px;
        }

        /* 🔥 GLASS CARD */
        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            animation: fadeIn 0.6s ease-in;
            font-size: 16px;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        }

        /* 🔥 BUTTONS */
        button {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
            padding: 12px 22px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #00c6ff;
        }

        button:active {
            transform: scale(0.95);
        }

        /* 🔥 RIPPLE EFFECT */
        button::after {
            content: "";
            position: absolute;
            width: 300%;
            height: 300%;
            top: 50%;
            left: 50%;
            background: rgba(255,255,255,0.2);
            transition: 0.5s;
            transform: translate(-50%, -50%) scale(0);
            border-radius: 50%;
        }

        button:active::after {
            transform: translate(-50%, -50%) scale(1);
            opacity: 0;
        }

        /* 🔥 INPUTS */
        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 18px;
            border-radius: 12px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
        }

        input::placeholder, textarea::placeholder {
            color: #ccc;
        }

        /* 🔥 LABELS */
        label {
            font-size: 16px;
            font-weight: 500;
        }

        /* 🔥 FIX DROPDOWN */
        select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-color: rgba(255,255,255,0.1);
            color: white;
        }

        select option {
            background: #203a43;
            color: white;
        }

        /* 🔥 STATUS COLORS */
        .status {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 600;
        }

        .pending {
            background: orange;
        }

        .progress {
            background: #00bfff;
        }

        .resolved {
            background: #00c853;
        }

        /* 🔥 FADE ANIMATION */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

    </style>
</head>

<body>

    <!-- 🔥 NAVBAR -->
    <nav>
        <div>
            <i class="fa-solid fa-building"></i> Smart Campus
        </div>

        <div>
            <a href="/">Home</a>
            <a href="/dashboard">Dashboard</a>
            <a href="/complaint">New Complaint</a>
            <a href="/track">Track</a>

            {% if session.get('role') == 'incharge' %}
                <a href="/incharge">Incharge</a>
            {% endif %}

            {% if session.get('role') == 'admin' %}
                <a href="/admin">Admin</a>
            {% endif %}

            {% if session.get('user') %}
                <a href="/logout">Logout</a>
            {% else %}
                <a href="/login">Login</a>
            {% endif %}
        </div>
    </nav>

    <!-- 🔥 CONTENT -->
    <div class="container">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
