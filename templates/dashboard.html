{% extends 'base.html' %}

{% block content %}

<h2><i class="fa-solid fa-chart-line"></i> Dashboard</h2>

<!-- 🔥 STATS CARDS -->
<div style="display:flex; gap:20px; flex-wrap:wrap; margin-top:20px;">

    <div class="card fade-in" style="flex:1; min-width:200px; text-align:center;">
        <h3><i class="fa-solid fa-list"></i> Total</h3>
        <h1>{{ total }}</h1>
    </div>

    <div class="card fade-in" style="flex:1; min-width:200px; text-align:center;">
        <h3><i class="fa-solid fa-clock"></i> Pending</h3>
        <h1 style="color:#f59e0b;">{{ pending }}</h1>
    </div>

    <div class="card fade-in" style="flex:1; min-width:200px; text-align:center;">
        <h3><i class="fa-solid fa-check-circle"></i> Resolved</h3>
        <h1 style="color:#22c55e;">{{ resolved }}</h1>
    </div>

</div>

<!-- 🔥 QUICK ACTIONS -->
<div style="margin-top:40px;">

    <h3><i class="fa-solid fa-bolt"></i> Quick Actions</h3>

    <div style="margin-top:15px;">

        <a href="/complaint">
            <button><i class="fa-solid fa-plus"></i> New Complaint</button>
        </a>

        <a href="/track">
            <button style="margin-left:10px;">
                <i class="fa-solid fa-list"></i> Track Complaints
            </button>
        </a>

        {% if role == 'admin' %}
        <a href="/admin">
            <button style="margin-left:10px;">
                <i class="fa-solid fa-user-shield"></i> Admin Panel
            </button>
        </a>
        {% endif %}

    </div>

</div>

<!-- 🔥 OPTIONAL: RECENT SECTION -->
<div class="card fade-in" style="margin-top:30px;">
    <h3><i class="fa-solid fa-clock-rotate-left"></i> Recent Activity</h3>
    <p style="opacity:0.7;">Your recent complaints will appear here</p>
</div>

{% endblock %}
