{% extends 'base.html' %}

{% block content %}

<div style="display:flex; justify-content:center; align-items:center; height:80vh;">

    <div class="card" style="width:350px; text-align:center; padding:20px;">

        <h2><i class="fa-solid fa-right-to-bracket"></i> Login</h2>

        <!-- 🔥 ERROR MESSAGE -->
        {% if error %}
            <p style="color:red;">{{ error }}</p>
        {% endif %}

        <form method="POST" style="margin-top:20px;">

            <input type="text" name="username" placeholder="Username" required
                   style="width:90%; padding:10px; margin:10px 0;">

            <!-- 🔥 PASSWORD FIELD WITH TOGGLE -->
            <div style="position:relative; width:90%; margin:10px auto;">

    <input type="password"
           id="password"
           name="password"
           placeholder="Password"
           required
           style="width:100%;
                  padding:10px 40px 10px 10px;
                  box-sizing:border-box;
                  border:none;
                  border-radius:12px;">

    <span onclick="togglePassword()"
          style="position:absolute;
                 right:15px;
                 top:50%;
                 transform:translateY(-50%);
                 cursor:pointer;">
        👁️
    </span>

</div>
            <!-- 🔥 FORGOT PASSWORD -->
            <div style="width:90%; margin:auto; text-align:right;">
                <a href="/forgot" style="font-size:13px; color:#38bdf8; text-decoration:none;">
                    Forgot Password?
                </a>
            </div>

            <button type="submit"
                    style="margin-top:15px; padding:10px 20px; background:#38bdf8; border:none; color:white; border-radius:5px; cursor:pointer;">
                Login
            </button>

        </form>

        <p style="margin-top:15px; opacity:0.7;">
            Don't have an account? 
            <a href="/register" style="color:#38bdf8;">Register</a>
        </p>

    </div>

</div>

<!-- 🔥 JAVASCRIPT -->
<script>
function togglePassword() {
    var x = document.getElementById("password");
    if (x.type === "password") {
        x.type = "text";
    } else {
        x.type = "password";
    }
}
</script>

{% endblock %}
